spring.application.name=Task Approval Service

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/vivatech_tasks?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.initialization-fail-timeout=30000

# Custom JWT Secret (Must be
# at least 256-bit / 32 characters)
security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION}
